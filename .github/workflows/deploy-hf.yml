# Deploy to HuggingFace Spaces
name: Deploy to HF Space

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sparse (huggingface_space only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: huggingface_space
          sparse-checkout-cone-mode: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install --no-cache-dir huggingface_hub

      - name: Deploy to HuggingFace Space
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os, sys

          token = os.environ.get('HF_TOKEN', '')
          if not token:
              print('HF_TOKEN not configured. Skipping deploy.')
              print('To enable: add HF_TOKEN in repo Settings > Secrets and variables > Actions')
              sys.exit(0)

          api = HfApi(token=token)
          api.upload_folder(
              folder_path='huggingface_space',
              repo_id='mustafabozkaya/enterprise-vision-ai',
              repo_type='space',
              commit_message='Deploy from GitHub Actions',
          )
          print('Successfully deployed to HuggingFace Space!')
          "
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
