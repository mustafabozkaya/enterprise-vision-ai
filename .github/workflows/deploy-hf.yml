# Deploy to HuggingFace Spaces
name: Deploy to HF Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to HuggingFace Space
        uses: amDDD/git2hfs@latest
        with:
          args: huggingface_space mustafabozkaya/enterprise-vision-ai
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
